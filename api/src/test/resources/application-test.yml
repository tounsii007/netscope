spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

netscope:
  cors:
    # CorsConfig rejects '*' (audit/F87 — no wildcard origins). Use an
    # explicit localhost so integration tests can boot the security
    # filter chain without tripping the wildcard validator.
    allowed-origins: http://localhost:3000
  rate-limit:
    anonymous-per-minute: 1000
    authenticated-per-minute: 10000
  tor:
    exit-list-url: http://localhost:0/none

logging:
  level:
    org.testcontainers: WARN
    com.github.dockerjava: WARN
    org.hibernate: WARN
