name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Least-privilege token: jobs only read the repo and upload artifacts via
# actions/upload-artifact (no extra scope needed).
permissions:
  contents: read

# Cancel in-flight runs for the same ref so a force-push doesn't queue
# four redundant builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ─── Frontend ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & component tests
        run: npm run test
        env:
          # Vitest's V8 coverage gate is configured in vitest.config.ts;
          # we just need the run to succeed here.
          CI: "true"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: web/coverage/
          retention-days: 14

      - name: Production build
        run: npm run build
        env:
          # Build mustn't fail on missing runtime envs — provide stubs so
          # the optimization phase can resolve the rewrite target.
          NEXT_PUBLIC_API_URL: https://api.traceronix.io
          NEXT_TELEMETRY_DISABLED: "1"

  # ─── Backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend (mvn verify)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Maven verify (compile + test + package)
        run: mvn -B -ntp verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-${{ github.run_id }}
          path: api/target/site/jacoco/
          retention-days: 14

  # ─── Performance Budget Gate ──────────────────────────────────────────
  perf-budget:
    name: Performance budget
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci --no-audit --no-fund
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.traceronix.io
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Check bundle-size budget
        run: node tests/perf/check-bundle-budget.mjs
