name: API

on:
  push: { branches: [main], paths: ["api/**", ".github/workflows/api.yml"] }
  pull_request: { paths: ["api/**"] }

jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: maven }
      - name: Unit + integration tests
        run: mvn -B verify
      - name: Upload JaCoCo coverage
        uses: codecov/codecov-action@v5
        with:
          files: api/target/site/jacoco/jacoco.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: api/target/surefire-reports/TEST-*.xml,api/target/failsafe-reports/TEST-*.xml

  mutation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults: { run: { working-directory: api } }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: maven }
      - name: Mutation testing
        run: mvn -B test org.pitest:pitest-maven:mutationCoverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-report
          path: api/target/pit-reports/

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          # load: true puts the built image into the local Docker
          # daemon so the next step (Trivy scan) can find it. Without
          # this, BuildKit builds into its own cache only and Trivy
          # fails with "unable to find the specified image
          # netscope-api:<sha> in [docker, containerd, podman, remote]".
          load: true
          tags: netscope-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        # Pinned to a release tag rather than @master so a compromise
        # of trivy-action / a malicious PR merged to its main branch
        # can't suddenly run with this job's GITHUB_TOKEN context.
        # Bump deliberately via Dependabot (config in
        # .github/dependabot.yml — recommend enabling if not already).
        # Note: trivy-action tags are prefixed with "v" (v0.36.0, v0.35.0,
        # …). The previous "0.28.0" reference failed at workflow init
        # with "unable to find version 0.28.0" — the unprefixed tag was
        # never published.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: netscope-api:${{ github.sha }}
          # exit-code: "1" means the gate WILL fail CI on a new
          # CRITICAL/HIGH CVE that has a published fix. We landed the
          # cleanup of the previous Go-stdlib backlog by bumping the
          # base image to eclipse-temurin:21-jre-noble and adding
          # `apt-get upgrade`. ignore-unfixed: true scopes the gate to
          # actionable findings only — unfixed CVEs surface in the log
          # but don't pin the gate red.
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
