name: Web

on:
  push: { branches: [main], paths: ["web/**", ".github/workflows/web.yml"] }
  pull_request: { paths: ["web/**"] }

jobs:
  static:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.netscope.io
          NEXT_PUBLIC_SITE_URL: https://netscope.io

  unit:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: "20", cache: npm, cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm test
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: web/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: "20", cache: npm, cache-dependency-path: web/package-lock.json }
      - run: npm ci
      # Include webkit: the "mobile" project in playwright.config.ts uses
      # devices["iPhone 13"], which Playwright routes through WebKit. With
      # only chromium+firefox installed the mobile suite fails at launch
      # with "Executable doesn't exist at .../webkit-XXXX/pw_run.sh".
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
        env: { CI: "true", NEXT_PUBLIC_API_URL: "http://localhost:8080" }
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
