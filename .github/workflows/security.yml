name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # ─── CodeQL ────────────────────────────────────────────────────────────
  # Disabled on this private repo: CodeQL upload requires GitHub
  # Code Scanning, which on private repos is gated behind GitHub
  # Advanced Security (a paid subscription). The job ran successfully
  # at the analysis step but always failed on the SARIF upload with:
  #
  #   "Code scanning is not enabled for this repository. Please enable
  #    code scanning in the repository settings."
  #
  # To turn back on: enable GHAS in Settings → Security & analysis →
  # Code scanning, then remove the `if: false` below.
  codeql:
    if: false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - java
          - javascript-typescript
    steps:
      - uses: actions/checkout@v7
      - name: Setup Java (for the Java matrix slice only)
        if: matrix.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Build Java
        if: matrix.language == 'java'
        run: cd api && mvn -B -DskipTests package
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # ─── Secret scan ───────────────────────────────────────────────────────
  # Replaced gitleaks/gitleaks-action@v2 (which now requires a paid
  # licence for private orgs, failing with "Resource not accessible by
  # integration") with TruffleHog's free OSS scan action. Both look for
  # committed credentials but TruffleHog is the maintained free option.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # On pull_request events we want a diff scan (base = target branch,
      # head = PR tip). On a push to main, BASE = HEAD which TruffleHog
      # refuses with "BASE and HEAD commits are the same"; in that case
      # we feed it the commit BEFORE the push (github.event.before) so
      # the scan covers just the new commits. Schedule + manual runs
      # fall through to a full repo scan (no base/head inputs).
      - name: TruffleHog OSS secret scan (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
      - name: TruffleHog OSS secret scan (push diff)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
      - name: TruffleHog OSS secret scan (full repo)
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ─── Dependency vulnerability scan ─────────────────────────────────────
  # The OSV reusable workflow uploads its SARIF report to GitHub Code
  # Scanning, which (same as the codeql job above) requires GitHub
  # Advanced Security. Without GHAS the upload step always fails with:
  #   "Code scanning is not enabled for this repository"
  # plus CODEQL_ACTION_JOB_STATUS: JOB_STATUS_CONFIGURATION_ERROR.
  #
  # Until GHAS is enabled, run osv-scanner inline as a plain dependency
  # report — no SARIF upload, no security-events:write permission,
  # results visible in the job logs. fail-on-vuln stays at the default
  # (true) so a newly-introduced critical/high CVE turns CI red,
  # matching what the SARIF-uploading variant did before.
  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install osv-scanner CLI
        run: |
          curl -sSfL \
            https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Scan dependencies
        # Strict on actual findings: a new vulnerable dependency turns
        # CI red. The previous backlog of 80 CVEs was cleared by
        # bumping Spring Boot to 3.5.12 + PostgreSQL JDBC 42.7.11 (pulls
        # in fixed Tomcat / Logback / Jackson / Netty / commons-*
        # transitively) and cli/go.mod to 1.25.10 (cleared 22 Go stdlib
        # CVEs).
        #
        # osv-scanner v2 also exits non-zero (127) when the transitive
        # Maven resolver fails on a single unresolvable artifact (e.g.
        # the org.apache.groovy 4.0.30 ghost that Spring Boot's BOM
        # ships even though it's not on Maven Central). That's an
        # infrastructure flake, not a security finding — so we
        # distinguish: real vulns (exit 1, log contains "Total N
        # packages affected" with N≥1) fail CI; transient resolver
        # failures with zero findings just print and pass.
        run: |
          set +e
          osv-scanner --recursive ./ | tee osv-output.txt
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
            echo "::notice::OSV scan clean."
            exit 0
          fi
          if grep -Eq "Total 0 packages affected by 0 known vulnerabilities" osv-output.txt; then
            echo "::warning::osv-scanner exited $rc but reported 0 vulnerabilities — treating as pass (transitive-resolver flake)."
            exit 0
          fi
          echo "::error::osv-scanner exited $rc AND reported vulnerabilities — failing."
          exit "$rc"
